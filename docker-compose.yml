
version: '3'

services:

  backend:
    build: ./backend
    container_name: flask_backend
    ports:
      - "5000:5000"

  nginx:
    image: nginx
    container_name: nginx_server
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - backend
